spring:
  datasource:
    url: ${DB_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}

  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:https://school-erp-frontend-ts.vercel.app}

  bootstrap:
    seed-demo-data: false
